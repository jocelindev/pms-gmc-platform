services:
  - type: web
    name: pms-gmc-platform
    runtime: python
    plan: free
    buildCommand: python -m py_compile server.py start.py database/init_database.py
    startCommand: python start.py --host 0.0.0.0
    healthCheckPath: /api/health
    envVars:
      - key: PMS_KOBO_AUTO_SYNC_INTERVAL_SECONDS
        value: "300"
      - key: PMS_KOBO_AUTO_SYNC_STARTUP_DELAY_SECONDS
        value: "5"
      - key: PMS_KOBO_SERVER_URL
        value: https://kf.kobotoolbox.org
      - key: PMS_KOBO_REFERENCE_FORM_UID
        value: ay5PAFNfJ8mzMUEnQELEsp
      - key: PMS_KOBO_OBJECTIVES_FORM_UID
        value: ae7vJ2AjmXXHQtbFhE2uy3
      - key: PMS_KOBO_CALCULATION_FORM_UID
        value: aWSxs5BEweHPnubKNb7a3g
      - key: PMS_KOBO_API_TOKEN
        sync: false
